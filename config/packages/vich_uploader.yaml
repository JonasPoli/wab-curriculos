vich_uploader:
    db_driver: orm

    metadata:
        type: attribute

    mappings:
        products:
            uri_prefix: /prod
            upload_destination: '%kernel.project_dir%/public/prod'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        tenant_logo:
            uri_prefix: /uploads/tenants/logo
            upload_destination: '%kernel.project_dir%/public/uploads/tenants/logo'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        tenant_dark_logo:
            uri_prefix: /uploads/tenants/dark-logo
            upload_destination: '%kernel.project_dir%/public/uploads/tenants/dark-logo'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        tenant_favicon:
            uri_prefix: /uploads/tenants/favicon
            upload_destination: '%kernel.project_dir%/public/uploads/tenants/favicon'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
